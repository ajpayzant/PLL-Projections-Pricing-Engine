name: Update PLL Data Warehouse

# Runs automatically every Sunday and Friday during the PLL season (May-August).
# Can also be triggered manually from the GitHub Actions tab at any time.
on:
  workflow_dispatch:       # manual trigger — click "Run workflow" in GitHub Actions tab
  schedule:
    - cron: '0 12 * * 0'  # Every Sunday at 8 AM ET (noon UTC) — after weekend games
    - cron: '0 12 * * 5'  # Every Friday at 8 AM ET (noon UTC) — before weekend games

permissions:
  contents: write          # needed to commit the updated data files back to the repo

jobs:
  build-warehouse:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      PLL_BEARER_TOKEN: ${{ secrets.PLL_BEARER_TOKEN }}
      PLL_TARGET_SEASONS: '2022,2023,2024,2025,2026'
      PLL_COMPETITION_TYPE: regular

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build warehouse (scrape + process + save parquets)
        run: python scripts/build_warehouse.py

      - name: Commit updated parquet and CSV files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update PLL data [skip ci]"
          # Only commit the lightweight data files — NOT the .duckdb binary.
          # The .duckdb is excluded by .gitignore; Streamlit rebuilds it from
          # these parquets at startup via scripts/bootstrap_db.py.
          file_pattern: |
            data/curated_data/**/*.parquet
            data/curated_data/**/*.csv
